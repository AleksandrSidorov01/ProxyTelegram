name: Build ProxyTelegram

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer
          xcodebuild -version

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            /private/var/tmp/_bazel_containerhost
          key: ${{ runner.os }}-bazel-${{ hashFiles('**/BUILD', '**/WORKSPACE') }}
          restore-keys: |
            ${{ runner.os }}-bazel-

      - name: Create canonical source directory
        run: |
          set -x
          sudo mkdir -p /Users/Shared
          cp -R $GITHUB_WORKSPACE /Users/Shared/
          mv /Users/Shared/$(basename $GITHUB_WORKSPACE) /Users/Shared/telegram-ios

      - name: Build the App
        run: |
          set -x

          # source code paths are included in the final binary, so we need to make them stable across builds
          SOURCE_DIR=/Users/Shared/telegram-ios

          # use canonical bazel root
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd $SOURCE_DIR

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$(echo $BUILD_NUMBER)" >> $GITHUB_ENV
          echo "APP_VERSION=$(echo $APP_VERSION)" >> $GITHUB_ENV

          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            --overrideXcodeVersion \
            build \
            --configurationPath="build-system/ptelegram-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER"

          # collect ipa
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            cp "$f" $OUTPUT_PATH/ProxyTelegram.ipa
          done

          # collect dsym
          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          zip -r "./$OUTPUT_PATH/ProxyTelegram.DSYMs.zip" build/DSYMs 1>/dev/null

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyTelegram-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: /Users/Shared/telegram-ios/build/artifacts/ProxyTelegram.ipa
          retention-days: 30

      - name: Upload DSYM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProxyTelegram-DSYMs-${{ env.APP_VERSION }}-${{ env.BUILD_NUMBER }}
          path: /Users/Shared/telegram-ios/build/artifacts/ProxyTelegram.DSYMs.zip
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.APP_VERSION }}-build${{ env.BUILD_NUMBER }}
          release_name: ProxyTelegram ${{ env.APP_VERSION }} (Build ${{ env.BUILD_NUMBER }})
          body: |
            ## ProxyTelegram ${{ env.APP_VERSION }} (Build ${{ env.BUILD_NUMBER }})

            Unofficial Telegram fork with WebSocket tunnel support for bypassing blocks.

            ### Features:
            - WebSocket tunnel for anti-blocking
            - Auto/Always/Disabled modes
            - Based on Telegram ${{ env.APP_VERSION }}

            **Note:** This is an unsigned build. You need to sign it yourself or use AltStore/Sideloadly.
          draft: false
          prerelease: false

      - name: Upload Release IPA
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: upload-release-ipa
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/ProxyTelegram.ipa
          asset_name: ProxyTelegram.ipa
          asset_content_type: application/zip

      - name: Upload Release DSYM
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: upload-release-dsym
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /Users/Shared/telegram-ios/build/artifacts/ProxyTelegram.DSYMs.zip
          asset_name: ProxyTelegram.DSYMs.zip
          asset_content_type: application/zip
